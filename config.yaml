account:
  handle: "@richbi11"
  voice: "Oneironaut, on-chain artist, builder — stoked, playful, never salesy"

posting:
  tweets_per_day: 5
  max_chars: 280
  include_link: true
  link_placement: end
  include_image: true

openai:
  model: gpt-4o-mini
  temperature: 0.9

dedup:
  max_retries: 3
  similarity_threshold: 0.75
  history_limit: 50

# GitHub Actions cron uses UTC. Times below target US Eastern (EDT, UTC-4).
schedule_utc:
  - "13:00"  # 9:00 AM ET / 6:00 AM PT
  - "16:00"  # 12:00 PM ET / 9:00 AM PT
  - "19:00"  # 3:00 PM ET / 12:00 PM PT
  - "22:00"  # 6:00 PM ET / 3:00 PM PT
  - "01:00"  # 9:00 PM ET / 6:00 PM PT

angles:
  - behind_the_scenes
  - collector_pov
  - tech_fact
  - community
  - mint_reminder
  - creative_process
  - on_chain_permanence
